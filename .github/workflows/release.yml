name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: lucid-optimizer.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: lucid-optimizer-mac

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (macOS)
        if: matrix.os == 'macos-latest'
        run: mv target/${{ matrix.target }}/release/lucid-optimizer target/${{ matrix.target }}/release/lucid-optimizer-mac

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          files: target/${{ matrix.target }}/release/${{ matrix.artifact }}
